server.port=8081
spring.application.name=service-receptor

# ---- RabbitMQ ----
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
# Si el consumidor rechaza un mensaje, que no lo re-encole infinitamente
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ---- Eventos (topic exchange) ----
# exchange y routing-key deben coincidir con los del service-emisor.
app.events.exchange=eventos
app.events.routing-key=demo.mensaje.creado
app.events.queue=receptor.eventos.queue
